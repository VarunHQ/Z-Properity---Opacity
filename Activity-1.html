<!DOCTYPE html>
<html lang="en">
<head>
    <title>Opacity</title>
    <style>
        div {
            background-color: green;
            padding: 10px;
        }
        .first {
            opacity: 0.1;
        }
        .second {
            opacity: 0.3;
        }
        .third {
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="first">
Opacity 0.1
    </div>
    <div class="second">
Opacity 0.3
</div>
<div class="third">
Opacity 0.6
</div>
<div>Opacity 1 (default)</div>
</body>
</html>
